<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1080, initial-scale=1" />
    <title>ICML 2026 Xiaohongshu Guide Cards V3</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1080px;
        min-height: 1440px;
        background: #101210;
        font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
        color: #171817;
      }

      body {
        overflow: hidden;
      }

      .card {
        position: relative;
        width: 1080px;
        height: 1440px;
        overflow: hidden;
        isolation: isolate;
        background: #f4f1e7;
      }

      .doodle-layer {
        position: absolute;
        inset: 0;
        z-index: -1;
        pointer-events: none;
      }

      .ai-overlay {
        position: absolute;
        display: block;
        object-fit: contain;
        object-position: center bottom;
        opacity: var(--ai-opacity, 0.84);
        filter: drop-shadow(8px 8px 0 rgba(20, 22, 20, 0.1));
      }

      .d-cover .ai-overlay { left: 30px; right: 30px; bottom: 72px; width: 1020px; height: 260px; --ai-opacity: 0.9; }
      .d-density .ai-overlay { left: 42px; right: 42px; bottom: 84px; width: 996px; height: 220px; --ai-opacity: 0.8; }
      .d-star .ai-overlay { left: 46px; right: 46px; bottom: 80px; width: 988px; height: 210px; --ai-opacity: 0.76; }
      .d-papers .ai-overlay,
      .d-papers2 .ai-overlay { left: 48px; right: 48px; bottom: 74px; width: 984px; height: 255px; --ai-opacity: 0.84; }
      .d-events .ai-overlay { left: 28px; right: 28px; bottom: 70px; width: 1024px; height: 440px; --ai-opacity: 0.9; }
      .d-seoul .ai-overlay { left: 34px; right: 34px; bottom: 72px; width: 1012px; height: 230px; --ai-opacity: 0.82; }

      .bg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0.42;
        filter: saturate(1.08) contrast(1.04);
        z-index: -3;
      }

      .wash {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 253, 240, 0.96), rgba(255, 249, 229, 0.86) 44%, rgba(241, 247, 241, 0.92)),
          radial-gradient(circle at 15% 12%, rgba(255, 206, 86, 0.38), transparent 33%),
          radial-gradient(circle at 82% 20%, rgba(59, 166, 154, 0.3), transparent 32%),
          radial-gradient(circle at 74% 88%, rgba(226, 92, 64, 0.22), transparent 40%);
        z-index: -2;
      }

      .ink {
        position: absolute;
        inset: 28px;
        border: 5px solid #141614;
        border-radius: 24px;
        box-shadow: 10px 10px 0 rgba(20, 22, 20, 0.18);
        pointer-events: none;
      }

      .content {
        position: absolute;
        inset: 56px 58px 52px;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }

      .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        font-size: 22px;
        font-weight: 900;
        color: #2a302d;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 42px;
        padding: 8px 14px;
        border: 3px solid #171817;
        border-radius: 999px;
        background: #fff7cd;
        box-shadow: 4px 4px 0 #171817;
        line-height: 1;
      }

      .lucide-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
        width: 1em;
        height: 1em;
        color: #171817;
        vertical-align: -0.14em;
      }

      .lucide-icon-glyph {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .tag .lucide-icon {
        width: 24px;
        height: 24px;
        color: #171817;
      }

      .icon-title {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .card .icon-title {
        display: flex;
        align-items: center;
        margin-top: 0;
      }

      .icon-title .lucide-icon {
        width: 25px;
        height: 25px;
        padding: 4px;
        border-radius: 8px;
        background: color-mix(in srgb, var(--icon-color, #0d615b) 14%, #fffdf3);
        color: var(--icon-color, #0d615b);
      }

      .card .icon-title .lucide-icon {
        display: inline-flex;
        margin-top: 0;
      }

      .icon-title .lucide-icon-glyph {
        filter: var(
          --icon-filter,
          brightness(0) saturate(100%) invert(25%) sepia(50%) saturate(926%) hue-rotate(133deg) brightness(91%)
            contrast(93%)
        );
      }

      .icon-title b,
      .icon-title strong {
        min-width: 0;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 76px;
        line-height: 0.98;
        letter-spacing: 0;
        color: #111512;
        text-wrap: balance;
      }

      .subhead {
        font-size: 28px;
        line-height: 1.35;
        font-weight: 800;
        color: #343d39;
      }

      .board {
        border: 4px solid #171817;
        border-radius: 20px;
        background:
          linear-gradient(180deg, rgba(255, 253, 243, 0.98), rgba(248, 244, 230, 0.95)),
          rgba(255, 252, 236, 0.94);
        box-shadow: 8px 8px 0 rgba(20, 22, 20, 0.18);
        overflow: hidden;
      }

      .board.dark {
        background: rgba(27, 33, 31, 0.95);
        color: #fff9dc;
      }

      .section-title {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 22px 12px;
        border-bottom: 3px solid #171817;
      }

      .section-title h2 {
        font-size: 31px;
        line-height: 1.08;
      }

      .section-title span {
        font-size: 18px;
        font-weight: 800;
        color: #5c625e;
        text-align: right;
      }

      .dark .section-title {
        border-color: rgba(255, 249, 220, 0.28);
      }

      .dark .section-title span {
        color: #d6cda1;
      }

      .grid {
        display: grid;
        gap: 14px;
        padding: 18px;
      }

      .facts {
        grid-template-columns: repeat(4, 1fr);
      }

      .fact {
        min-height: 110px;
        border: 3px solid #171817;
        border-radius: 16px;
        background: #ffffff;
        padding: 14px 12px;
        box-shadow: 4px 4px 0 rgba(20, 22, 20, 0.12);
      }

      .fact b {
        display: block;
        font-size: 34px;
        line-height: 1;
        color: #111512;
      }

      .fact span {
        display: block;
        margin-top: 8px;
        font-size: 17px;
        line-height: 1.25;
        font-weight: 800;
        color: #4b5350;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        padding: 18px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 42px;
        padding: 9px 13px;
        border: 3px solid #171817;
        border-radius: 999px;
        background: #d7f2e7;
        font-size: 19px;
        font-weight: 900;
        line-height: 1.05;
      }

      .chip.alt {
        background: #ffd9bb;
      }

      .chip.blue {
        background: #d9e9ff;
      }

      .note {
        padding: 16px 20px 20px;
        font-size: 21px;
        line-height: 1.35;
        font-weight: 800;
        color: #373f3a;
      }

      .tiny {
        font-size: 15px;
        line-height: 1.28;
        color: #5e655f;
        font-weight: 750;
      }

      .venue-layout {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 18px;
        padding: 18px;
      }

      .cover-map {
        height: 460px;
        margin: 18px 18px 0;
        border: 4px solid #171817;
        border-radius: 18px;
        background: #ffffff;
        overflow: hidden;
      }

      .cover-map img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center center;
      }

      .cover-anchors {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
        padding: 12px 18px 18px;
      }

      .cover-board .cover-anchors {
        padding-bottom: 14px;
        border-bottom: 4px solid #171817;
      }

      .cover-anchor {
        --icon-color: #0d615b;
        --icon-hue: 140deg;
        --icon-filter: brightness(0) saturate(100%) invert(25%) sepia(50%) saturate(926%) hue-rotate(133deg)
          brightness(91%) contrast(93%);
        border: 3px solid #171817;
        border-radius: 16px;
        background: #fffdf3;
        padding: 10px 12px;
        min-height: 86px;
      }

      .cover-anchor b {
        display: block;
        font-size: 23px;
        line-height: 1.05;
        color: #0d615b;
      }

      .cover-anchor span {
        display: block;
        margin-top: 7px;
        font-size: 16px;
        line-height: 1.2;
        font-weight: 800;
        color: #4e5752;
      }

      .cover-board .xhs-venue-map {
        height: 372px;
        margin: 0 18px;
      }

      .cover-board .xhs-samseong,
      .cover-board .xhs-bongeunsa {
        top: 86%;
        font-size: 20px;
      }

      .map-strip-title {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 14px;
        padding: 14px 20px 8px;
        font-weight: 950;
        color: #111512;
      }

      .map-strip-title b {
        font-size: 23px;
        line-height: 1.08;
      }

      .map-strip-title span {
        font-size: 15px;
        line-height: 1.1;
        color: #5b625d;
        text-align: right;
      }

      .xhs-venue-map {
        position: relative;
        height: 508px;
        margin: 18px 18px 0;
        border: 4px solid #171817;
        border-radius: 18px;
        background:
          linear-gradient(rgba(75, 67, 50, 0.055) 1px, transparent 1px),
          linear-gradient(90deg, rgba(75, 67, 50, 0.055) 1px, transparent 1px),
          #f4f1e8;
        background-size: 34px 34px;
        overflow: hidden;
      }

      .xhs-venue-map::before {
        position: absolute;
        top: 7%;
        bottom: 13%;
        left: 43%;
        width: 3%;
        border-radius: 10px;
        background: rgba(75, 67, 50, 0.08);
        content: "";
      }

      .xhs-venue-map::after {
        position: absolute;
        right: 2%;
        bottom: 13%;
        left: 2%;
        height: 2px;
        background: rgba(75, 67, 50, 0.16);
        content: "";
      }

      .xhs-hall {
        position: absolute;
        z-index: 1;
        display: grid;
        place-items: center;
        min-width: 0;
        border: 3px solid rgba(255, 253, 246, 0.72);
        border-radius: 10px;
        background: rgba(11, 107, 98, 0.1);
        color: rgba(32, 32, 29, 0.84);
        font-size: 25px;
        font-weight: 950;
        line-height: 1.05;
        text-align: center;
      }

      .xhs-cr4,
      .xhs-cr3,
      .xhs-cbs {
        left: 4%;
        width: 15.5%;
        background: rgba(104, 100, 91, 0.12);
        color: rgba(32, 32, 29, 0.72);
        font-size: 18px;
        letter-spacing: 0;
      }

      .xhs-cr4 { top: 7%; height: 18%; }
      .xhs-cr3 { top: 25%; height: 16%; }
      .xhs-cbs { top: 41%; height: 19%; font-size: 16px; }

      .xhs-service-strip {
        position: absolute;
        top: 7%;
        left: 19.5%;
        z-index: 0;
        width: 3%;
        height: 69%;
        border-radius: 10px;
        background: rgba(104, 100, 91, 0.08);
      }

      .xhs-hall-c,
      .xhs-hall-d,
      .xhs-hall-a,
      .xhs-hall-b {
        background:
          linear-gradient(to bottom, transparent 48%, rgba(255, 253, 246, 0.55) 48%, rgba(255, 253, 246, 0.55) 53%, transparent 53%),
          rgba(11, 107, 98, 0.1);
      }

      .xhs-hall-c { left: 23%; top: 7%; width: 20%; height: 34%; }
      .xhs-hall-a { left: 23%; top: 41%; width: 20%; height: 35%; }
      .xhs-hall-d { left: 46%; top: 7%; width: 34%; height: 34%; }
      .xhs-hall-b { left: 46%; top: 41%; width: 34%; height: 35%; }
      .xhs-room-e { left: 27%; top: 26%; z-index: 2; width: 12%; height: 14%; background: rgba(38, 92, 156, 0.1); font-size: 18px; }
      .xhs-aud { left: 81%; top: 7%; width: 16%; height: 34%; background: rgba(38, 92, 156, 0.1); font-size: 20px; }
      .xhs-asem { left: 81%; top: 41%; width: 16%; height: 16%; background: rgba(38, 92, 156, 0.1); font-size: 15px; line-height: 0.98; }
      .xhs-gb { left: 81%; top: 57%; width: 16%; height: 19%; background: rgba(38, 92, 156, 0.1); font-size: 15px; line-height: 0.98; }

      .xhs-marker {
        position: absolute;
        z-index: 5;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 11px 7px;
        border: 2px solid rgba(182, 61, 42, 0.28);
        border-radius: 999px;
        background: rgba(255, 253, 246, 0.94);
        color: #9f3526;
        font-size: 14px;
        font-weight: 950;
        line-height: 1;
        box-shadow: 0 6px 14px rgba(75, 67, 50, 0.12);
        transform: translate(-50%, -50%);
      }

      .xhs-badge-marker { left: 74%; top: 68%; }
      .xhs-bag-marker { left: 86%; top: 53%; border-color: rgba(38, 92, 156, 0.28); color: #265c9c; }

      .xhs-mall {
        position: absolute;
        top: 78%;
        left: 3%;
        right: 3%;
        z-index: 0;
        display: grid;
        place-items: center;
        height: 11%;
        border-radius: 10px;
        background:
          linear-gradient(to right, rgba(36, 160, 32, 0.14), transparent 18% 82%, rgba(208, 160, 0, 0.18)),
          rgba(138, 90, 0, 0.08);
        color: rgba(32, 32, 29, 0.56);
        font-size: 21px;
        font-weight: 950;
        letter-spacing: 0.02em;
      }

      .xhs-station {
        position: absolute;
        z-index: 2;
        display: flex;
        align-items: center;
        gap: 7px;
        color: rgba(32, 32, 29, 0.76);
        font-size: 22px;
        font-weight: 950;
        line-height: 1.05;
        white-space: nowrap;
      }

      .xhs-station i {
        flex: 0 0 auto;
        width: 17px;
        height: 17px;
        border: 3px solid #fffdf6;
        border-radius: 5px;
        box-shadow: 0 0 0 1px rgba(75, 67, 50, 0.12);
      }

      .xhs-samseong { left: 4%; top: 90%; }
      .xhs-bongeunsa { right: 3%; top: 90%; text-align: right; }
      .xhs-samseong i { background: #24a020; }
      .xhs-bongeunsa i { order: 2; background: #d0a000; }

      .arrival-map {
        display: grid;
        gap: 9px;
        margin: 0 18px;
        padding: 12px;
        border: 4px solid #171817;
        border-radius: 18px;
        background:
          linear-gradient(rgba(75, 67, 50, 0.05) 1px, transparent 1px),
          linear-gradient(90deg, rgba(75, 67, 50, 0.05) 1px, transparent 1px),
          #fbf8eb;
        background-size: 28px 28px;
      }

      .arrival-lane {
        display: grid;
        grid-template-columns: 178px 1fr 272px;
        gap: 10px;
        align-items: stretch;
        min-height: 70px;
      }

      .arrival-node,
      .arrival-route {
        border: 3px solid #171817;
        border-radius: 15px;
        background: #fffdf5;
        padding: 8px 10px;
        box-shadow: 3px 3px 0 rgba(20, 22, 20, 0.12);
      }

      .arrival-node strong,
      .arrival-route strong {
        display: block;
        font-size: 17px;
        line-height: 1.08;
        color: #111512;
      }

      .arrival-node span,
      .arrival-route span {
        display: block;
        margin-top: 3px;
        font-size: 12.5px;
        line-height: 1.12;
        font-weight: 850;
        color: #4e5752;
      }

      .arrival-route {
        position: relative;
        display: grid;
        place-content: center;
        min-width: 0;
        text-align: center;
      }

      .arrival-route::before,
      .arrival-route::after {
        position: absolute;
        top: 50%;
        width: 14px;
        height: 4px;
        background: currentColor;
        content: "";
      }

      .arrival-route::before { left: -13px; }
      .arrival-route::after { right: -13px; }

      .arrival-route.bus {
        color: #bc3d2b;
        background: #fff2eb;
      }

      .arrival-route.rail {
        color: #0d615b;
        background: #eff8f3;
      }

      .arrival-route.subway {
        color: #a67c00;
        background: #fff7d8;
      }

      .arrival-dest strong {
        color: #0d615b;
      }

      .map-frame {
        height: 510px;
        border: 4px solid #171817;
        border-radius: 18px;
        background: #ffffff;
        overflow: hidden;
      }

      .map-frame img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      .stack {
        display: grid;
        gap: 12px;
      }

      .mini-card {
        --icon-color: #0d615b;
        --icon-hue: 140deg;
        --icon-filter: brightness(0) saturate(100%) invert(25%) sepia(50%) saturate(926%) hue-rotate(133deg)
          brightness(91%) contrast(93%);
        border: 3px solid #171817;
        border-radius: 16px;
        background: #fffdf3;
        padding: 14px 15px;
      }

      .mini-card strong {
        display: block;
        font-size: 23px;
        line-height: 1.12;
      }

      .mini-card span {
        display: block;
        margin-top: 6px;
        font-size: 17px;
        line-height: 1.28;
        font-weight: 750;
        color: #555d58;
      }

      .topic-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        padding: 18px;
      }

      .topic-card {
        --icon-color: #0d615b;
        --icon-hue: 140deg;
        --icon-filter: brightness(0) saturate(100%) invert(25%) sepia(50%) saturate(926%) hue-rotate(133deg)
          brightness(91%) contrast(93%);
        border: 3px solid #171817;
        border-radius: 18px;
        background: #ffffff;
        min-height: 158px;
        padding: 14px 15px 12px;
      }

      .topic-card h3 {
        margin: 0 0 10px;
        font-size: 24px;
        line-height: 1.08;
      }

      .session-line {
        display: grid;
        grid-template-columns: 92px 1fr;
        gap: 8px;
        align-items: start;
        padding: 8px 0;
        border-top: 2px dashed rgba(23, 24, 23, 0.18);
        font-size: 17px;
        line-height: 1.18;
        font-weight: 850;
      }

      .session-line:first-of-type {
        border-top: 0;
      }

      .session-line b {
        color: #0d615b;
      }

      .session-line span {
        color: #3c4540;
      }

      .paper-list {
        display: grid;
        gap: 10px;
        padding: 16px;
      }

      .paper-row {
        display: grid;
        grid-template-columns: 150px 1fr 130px;
        gap: 12px;
        align-items: center;
        min-height: 82px;
        border: 3px solid #171817;
        border-radius: 16px;
        background: #fffdf3;
        padding: 10px 12px;
      }

      .paper-row .where {
        font-size: 19px;
        line-height: 1.15;
        font-weight: 950;
        color: #0d615b;
      }

      .paper-row .title {
        font-size: 20px;
        line-height: 1.16;
        font-weight: 880;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .paper-row .names {
        font-size: 17px;
        line-height: 1.18;
        font-weight: 950;
        color: #9b3c25;
        text-align: right;
      }

      .route-list {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .route-block {
        border: 3px solid #171817;
        border-radius: 18px;
        background: #ffffff;
        padding: 13px 14px;
      }

      .route-head {
        --icon-color: #0d615b;
        --icon-hue: 140deg;
        --icon-filter: brightness(0) saturate(100%) invert(25%) sepia(50%) saturate(926%) hue-rotate(133deg)
          brightness(91%) contrast(93%);
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 8px;
      }

      .route-head b {
        font-size: 23px;
        line-height: 1.05;
        color: #0d615b;
      }

      .route-head span {
        font-size: 17px;
        font-weight: 850;
        color: #525b56;
        text-align: right;
      }

      .poster-picks {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .poster-pick {
        border-radius: 12px;
        background: #f0f7ef;
        padding: 9px 10px;
        min-height: 70px;
      }

      .poster-pick b {
        display: inline;
        font-size: 18px;
        color: #9b3c25;
      }

      .poster-pick span {
        font-size: 17px;
        line-height: 1.16;
        font-weight: 830;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .event-columns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }

      .event-columns.merged {
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
        padding: 15px;
      }

      .event-day {
        border: 3px solid #171817;
        border-radius: 18px;
        background: #fffdf3;
        overflow: hidden;
      }

      .event-day h3 {

  <body>
    <div id="root"></div>
    <script src="./content.js"></script>
    <script>
      const CONTENT = window.CONTENT;

      const bg = {
        cover: "../backgrounds/01-cover-bg.png",
        venue: "../backgrounds/02-venue-bg.png",
        density: "../backgrounds/04-schedule-bg.png",
        star: "../backgrounds/04-schedule-bg.png",
        papers: "../backgrounds/04-schedule-bg.png",
        papers2: "../backgrounds/04-schedule-bg.png",
        events: "../backgrounds/06-events-bg.png",
        airport: "../backgrounds/03-airport-bg.png",
        seoul: "../backgrounds/05-seoul-bg.png",
        onsite: "../backgrounds/08-overview-bg.png",
        promo: "../backgrounds/01-cover-bg.png",
      };

      const topicNames = new Map([
        ["LLM / Foundation Models", "LLM / Foundation Models"],
        ["Multimodal / Vision-Language / Video", "VLM / Video"],
        ["Agents / Tool Use / GUI", "Agents / GUI"],
        ["Robotics / Embodied AI", "Robotics / VLA"],
        ["AI Safety / Alignment / Reliability", "Safety / Alignment"],
        ["AI4Science / Bio / Molecules", "AI4Science"],
        ["Data / Evaluation / Benchmarks", "Eval / Benchmarks"],
        ["Efficient ML / Systems / Hardware", "Efficient ML / Systems"],
      ]);

      const esc = (value) =>
        String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");

      const shortTime = (time) => {
        const match = String(time || "").match(/(\d{2}:\d{2})/);
        return match ? match[1] : String(time || "").replace("2026-", "");
      };

      const truncate = (text, length) => {
        const value = String(text || "");
        return value.length > length ? value.slice(0, length - 1) + "…" : value;
      };

      const positionNumber = (position) => {
        const match = String(position || "").match(/\d+/);
        return match ? Number(match[0]) : Number.MAX_SAFE_INTEGER;
      };

      const byPosition = (a, b) => positionNumber(a.position) - positionNumber(b.position);

      const sessionFull = (session) => {
        const match = String(session || "").match(/S(\d+)/i);
        return match ? `Poster Session ${match[1]}` : String(session || "");
      };

      const cleanTitle = (text) =>
        String(text || "")
          .replace(/[🍺🍕]/g, "")
          .replace(/\s{2,}/g, " ")
          .trim();

      const icon = (name, className = "") =>
        `<span class="lucide-icon ${esc(className)}" aria-hidden="true"><img class="lucide-icon-glyph" src="../icons/${esc(name)}.svg" alt="" /></span>`;

      const iconTitle = (name, text, tag = "b") =>
        `<span class="icon-title">${icon(name)}<${tag}>${esc(text)}</${tag}></span>`;

      const topicIcon = (topic) => {
        if (topic.includes("Foundation")) return "book-open";
        if (topic.includes("Video")) return "presentation";
        if (topic.includes("Agents")) return "mouse-pointer-click";
        if (topic.includes("Robotics")) return "route";
        if (topic.includes("Safety")) return "badge-check";
        if (topic.includes("Efficient")) return "clipboard-list";
        return "file-search";
      };

      const doodleLayer = (key) => {
        const overlays = {
          cover: "../ai_overlays/transparent/01-cover-route.png",
          density: "../ai_overlays/transparent/02-density.png",
          star: "../ai_overlays/transparent/03-star-papers.png",
          papers: "../ai_overlays/transparent/04-paper-route-a.png",
          papers2: "../ai_overlays/transparent/05-paper-route-b.png",
          events: "../ai_overlays/transparent/06-events.png",
          seoul: "../ai_overlays/transparent/07-seoul.png",
        };
        const src = overlays[key];
        if (!src) return "";
        return `
          <div class="doodle-layer d-${key}">
            <img class="ai-overlay" src="${src}" alt="" />
          </div>
        `;
      };

      const card = (key, klass, inner) => `
        <section class="card ${klass || ""}">
          <img class="bg" src="${bg[key]}" alt="" />
          <div class="wash"></div>
          ${doodleLayer(key)}
          <div class="ink"></div>
          <main class="content">${inner}</main>
        </section>
      `;

      const header = (kicker, title, subhead = "", iconName = "") => `
        <div class="topline"><span class="tag">${iconName ? icon(iconName) : ""}${esc(kicker)}</span><span>ICML 2026 · Seoul COEX</span></div>
        <h1>${esc(title)}</h1>
        ${subhead ? `<p class="subhead">${esc(subhead)}</p>` : ""}
      `;

      const footer = (left, right = "ICML 2026 · Seoul COEX · KST") => `
        <div class="footer"><span>${left}</span><span>${right}</span></div>
      `;

      const venueMapMarkup = (extraMarkers = "", className = "") => `
        <div class="xhs-venue-map ${className}" aria-label="COEX venue map">
          <span class="xhs-hall xhs-cr4">Conf. Room<br />400-403</span>
          <span class="xhs-hall xhs-cr3">Conf. Room<br />300-328</span>
          <span class="xhs-hall xhs-cbs">COEX<br />Broadcast<br />Studio</span>
          <span class="xhs-service-strip"></span>
          <span class="xhs-hall xhs-hall-c">Hall C</span>
          <span class="xhs-hall xhs-hall-a">Hall A</span>
          <span class="xhs-hall xhs-hall-d">Hall D</span>
          <span class="xhs-hall xhs-hall-b">Hall B</span>
          <span class="xhs-hall xhs-room-e">Room E</span>
          <span class="xhs-hall xhs-aud">Auditorium</span>
          <span class="xhs-hall xhs-asem">ASEM<br />Ballroom<br />201-211</span>
          <span class="xhs-hall xhs-gb">Grand<br />Ballroom<br />101-105</span>
          <span class="xhs-marker xhs-bag-marker">BAG</span>
          <span class="xhs-marker xhs-badge-marker">BADGE</span>
          ${extraMarkers}
          <span class="xhs-mall">Starfield COEX Mall · B1 connection</span>
          <span class="xhs-station xhs-samseong"><i></i><b>Samseong Station<br />Line 2</b></span>
          <span class="xhs-station xhs-bongeunsa"><i></i><b>Bongeunsa Station<br />Line 9</b></span>
        </div>
      `;

      const arrivalRouteMapMarkup = () => `
        <div class="arrival-map" aria-label="Airport and subway route map">
          <div class="arrival-lane">
            <div class="arrival-node"><strong>ICN · 仁川机场</strong><span>Incheon Airport<br />인천공항 T1/T2</span></div>
            <div class="arrival-route bus"><strong>6103 Airport Limousine</strong><span>机场巴士 / 공항리무진 6103</span></div>

      function renderVenue() {

      function renderDensity() {
        const wanted = [
          "LLM / Foundation Models",
          "Multimodal / Vision-Language / Video",
          "Agents / Tool Use / GUI",
          "Robotics / Embodied AI",
          "AI Safety / Alignment / Reliability",
          "Efficient ML / Systems / Hardware",
        ];
        const data = CONTENT.topic_density.filter((row) => wanted.includes(row.topic));
        const items = data
          .map((row) => {
            const sessions = row.top_sessions
              .map(
                (s) => `
                  <div class="session-line">
                    <b>${s.date}<br />${s.time}</b>
                    <span>${sessionFull(s.session)}<br />${s.papers} papers · ${s.oral} oral-linked · ${s.spotlight} spotlight</span>
                  </div>
                `,
              )
              .join("");
            return `<div class="topic-card"><h3>${iconTitle(topicIcon(row.topic), topicNames.get(row.topic) || row.topic)}</h3>${sessions}</div>`;
          })
          .join("");
        return card(
          "density",
          "dense",
          `
            ${header("02 · Poster 密度", "先冲这些高密度时段", "LLM / Video / Agents / Robotics / Safety / Systems：看 papers、oral-linked、spotlight", "clipboard-list")}
            <div class="board">
              <div class="topic-grid">${items}</div>
              <p class="note">同方向优先看 oral-linked 和 spotlight 都高的 slot；Hall A 里按 poster number 找摊位。</p>
            </div>
            ${footer("用法：先挑同方向高密度 session，再进 Hall A 找摊位号")}
          `,
        );
      }

      function renderStarPapers() {
        const rows = [...CONTENT.star_papers]
          .sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`) || positionNumber(a.position) - positionNumber(b.position))
          .slice(0, 10)
          .map(
            (p) => `
              <div class="paper-row">
                <div class="where">${esc(p.date)}<br />${esc(p.time)}<br />${esc(p.position)} ${p.oral ? "ORAL" : ""}</div>
                <div class="title">${esc(p.title)}</div>
                <div class="names">${esc(p.names)}</div>
              </div>
            `,
          )
          .join("");
        return card(
          "star",
          "dense",
          `
            ${header("03 · 明星作者", "大牛摊位时间表", "Yann LeCun / Kaiming He / Yoshua Bengio / Li Fei-Fei / Chelsea Finn 等", "users")}
            <div class="board">
              <div class="paper-list">${rows}</div>
              <p class="note">时间冲突时，优先挑同一 session 内离目标主题最近的 2-3 篇。</p>
            </div>
            ${footer("用法：按日期时间扫；冲突时优先同 session 就近摊位")}
          `,
        );
      }

      function renderPaperRoutes() {
        const routes = CONTENT.paper_routes.filter((r) => r.theme.includes("personal")).slice(0, 4);
        const blocks = routes
          .map((route) => {
            const picks = [...route.examples]
              .sort(byPosition)
              .slice(0, 4)
              .map((p) => `<div class="poster-pick"><span><b>${esc(p.position)}</b> ${esc(p.title)}</span></div>`)
              .join("");
            return `
              <div class="route-block">
                <div class="route-head">${iconTitle("route", `${route.date} · ${route.time}`)}<span>${esc(sessionFull(route.session))}</span></div>
                <div class="poster-picks">${picks}</div>
              </div>
            `;
          })
          .join("");
        return card(
          "papers",
          "dense",
          `
            ${header("04 · Video / MLLM 上半场", "前四场怎么扫 poster", "07/07 10:30 到 07/08 14:30：每场 4 篇，按摊位号顺路", "route")}
            <div class="board">
              <div class="route-list">${blocks}</div>
            </div>
            ${footer("Route A：S1-S4 · video anomaly / video LLM / visual reasoning")}
          `,
        );
      }

      function renderPaperRoutesLate() {
        const routes = CONTENT.paper_routes.filter((r) => r.theme.includes("personal")).slice(4, 8);
        const blocks = routes
          .map((route) => {
            const picks = [...route.examples]
              .sort(byPosition)
              .slice(0, 4)
              .map((p) => `<div class="poster-pick"><span><b>${esc(p.position)}</b> ${esc(p.title)}</span></div>`)
              .join("");
            return `
              <div class="route-block">
                <div class="route-head">${iconTitle("route", `${route.date} · ${route.time}`)}<span>${esc(sessionFull(route.session))}</span></div>
                <div class="poster-picks">${picks}</div>
              </div>
            `;
          })
          .join("");
        return card(
          "papers2",
          "dense",
          `
            ${header("05 · Video / MLLM 下半场", "后四场继续扫", "07/08 17:00 到 07/09 17:00：VLM reasoning / world model / safety", "route")}
            <div class="board">
              <div class="route-list">${blocks}</div>
            </div>
            ${footer("Route B：S5-S8 · anomaly / VLM / embodied / world model")}
          `,
        );
      }

      const eventTopic = (event) => {
        const topics = event.topics || [];
        if (topics.includes("Confirmed")) return "confirmed";
        if (topics.includes("线索 / Lead")) return "lead";
        if (topics.includes("Official Social")) return "official";
        if (topics.includes("Luma")) return "Luma";
        return topics[0] || "event";
      };

      function renderEventDay(date, events, maxItems = 12) {
        const items = events
          .filter((event) => event.date === date)
          .slice(0, maxItems)
          .map(
            (event) => `
              <div class="event-item">
                <div class="event-time">${esc(shortTime(event.time))}</div>
                <div>
                  <div class="event-title">${esc(truncate(cleanTitle(event.title), 72))}</div>
                  <span class="event-meta">${esc(eventTopic(event))}</span>
                </div>
              </div>
            `,
          )
          .join("");
        return `<div class="event-day"><h3>${iconTitle("calendar-days", date)}</h3>${items}</div>`;
      }

      function renderEvents() {
        const events = CONTENT.external_events;
        const indexes = [
          ["Official social · 07/06 19:00", "AI Co-scientists; AI for Games; India @ ICML; ICML Chess Club. 都是 ICML official social。"],
          ["Company / infra · Luma", "07/06 VESSL/FAR.AI/FriendliAI; 07/07 Upstage/Furiosa/Quadrillion; 07/08 Goodfire/Turing/OpenAI Codex/Liner x VESSL; 07/09 Qwen."],
          ["Research themes", "Science & Art; Camp Code-Gen; Multi-Agent Systems and Scientific Discovery; AI x Education; Robotics Night."],
          ["中文相关 / 状态", "07/08 K-Star 快手 confirmed; 将门/腾讯/阿里为 lead; 07/09 ShanghaiTech lead; Qwen confirmed."],
        ];
        const indexHtml = indexes
          .map(([title, body]) => `<div class="event-index"><b>${esc(title)}</b><span>${esc(body)}</span></div>`)
          .join("");
        return card(
          "events",
          "dense",
          `
            ${header("06 · 晚间活动", "Jul 6-9 活动索引", "按日期列活动名、时间和状态标签：official / Luma / confirmed / lead", "party-popper")}
            <div class="board">
              <div class="event-columns merged">
                ${renderEventDay("07/06", events, 5)}
                ${renderEventDay("07/07", events, 6)}
                ${renderEventDay("07/08", events, 6)}

              <div class="event-index-grid">${indexHtml}</div>
            </div>
            ${footer("状态：official / Luma / confirmed / lead 按图中标签区分")}
          `,
        );
      }

      function renderSeoul() {
        const photos = [
          ["../photos/starfield_library.jpg", "Starfield Library", "会间隙 / 雨天 / 等人"],
          ["../photos/bongeunsa.jpg", "Bongeunsa", "离 COEX 最近的安静短线"],
          ["../photos/seongsu.jpg", "Seongsu", "cafe / brand space / 买逛"],
          ["../photos/seoul_forest.jpg", "Seoul Forest", "和 Seongsu 合并，不单独跑"],

      function renderOnsite() {
        const picks = [
          ["Registration · Hall B Foyer", "Jul 6 07:00-18:00；Jul 7-9 07:30-18:00；Jul 10 07:30-16:00；Jul 11 07:30-12:00。"],

          "small-title",
          `
            ${header("09 · COEX 现场刚需", "彩色点位 + 地点时间", "注册台、医疗、寄存、午餐、Wi-Fi、poster 作者事项", "clipboard-list")}
            <div class="board onsite-board">
              <div class="map-strip-title"><b>现场点位图 · color-coded COEX anchors</b><span>颜色对应下方地点</span></div>
              ${venueMapMarkup(onsiteMarkersMarkup(), "onsite-map")}
              <div class="site-legend">
                <span><i style="--site-color:#d84a36"></i>Reg/Help: Hall B Foyer</span>
                <span><i style="--site-color:#c51f3f"></i>First Aid: West Gate / Hall A4</span>
                <span><i style="--site-color:#265c9c"></i>Luggage: 2F Plaetz</span>
                <span><i style="--site-color:#7d4ac7"></i>Prayer/Nursing: ASEM 207/209/211</span>
                <span><i style="--site-color:#d0a000"></i>WC: Auditorium 3F right side</span>
                <span><i style="--site-color:#24a020"></i>Poster tape: Hall A volunteers</span>
              </div>
              <div class="opportunity-grid">${html}</div>

      function renderPromo() {
        const features = [
          ["calendar-days", "Daily route", "当天 oral / poster / workshop"],
          ["file-search", "Paper watchlist", "主题密度、明星作者、路线"],
          ["map-pinned", "COEX map", "机场路线、会场、周边点位"],
          ["party-popper", "Evening events", "Jul 6-9 活动候选清单"],
          ["coffee", "Eat guide", "18 个吃什么 + 区域路线"],
          ["smartphone", "Shop guide", "24 个伴手礼 + 搜索词"],
        ];
        const featureHtml = features
          .map(([iconName, name, desc]) => `<div class="promo-feature">${iconTitle(iconName, name)}<span>${esc(desc)}</span></div>`)
          .join("");
        const details = [
          ["Daily tabs", "Jul 6 tutorial；Jul 7-9 poster session；Jul 10-11 workshop；底部 tab 直接切天。"],
          ["Paper watchlist", "34 篇重点；Video Anomaly、Multimodal LLMs、Reasoning、Video、Anomaly Detection。"],
          ["Travel page", "COEX 会场、ICN/GMP 到场路线、Starfield/Bongeunsa/Seongsu/古宫/Namsan。"],
          ["Eat / Shop", "新增吃什么和买什么：18 个食物、24 个伴手礼，支持 Google / Naver / copy。"],
        ];
        const detailHtml = details
          .map(([title, body]) => `<div class="promo-detail"><b>${esc(title)}</b><span>${esc(body)}</span></div>`)
          .join("");
        return card(
          "promo",
          "small-title",
          `
            ${header("08 · 网页入口", "网页里查新版清单", "图上先看重点；网页补全日程、论文路线、活动、地图、吃饭和伴手礼", "smartphone")}
            <div class="board promo-board">
              <div class="phone-frame">
                <img src="../screenshots/mobile-homepage-promo-bar.png" alt="ICML 2026 Field Guide mobile screenshot" />
              </div>
              <div class="promo-copy">
                <div class="search-ticket">
                  <span>网页入口线索</span>
                  <b>GitHub: 2-mo/ICML-2026-Field-Guide</b>

                <div class="promo-feature-grid">${featureHtml}</div>

                <div class="promo-detail-list">${detailHtml}</div>
                <div class="promo-sticker-wrap"><img class="promo-sticker" src="../stickers/promo-route-sticker.png" alt="" /></div>

            </div>
            ${footer("网页补全：日程 / 论文 / 活动 / 地图 / 吃饭 / 伴手礼", "GitHub: 2-mo/ICML-2026-Field-Guide")}
          `,
        );
      }

      const renderers = {
        cover: renderCover,
        venue: renderVenue,
        density: renderDensity,
        star: renderStarPapers,
        papers: renderPaperRoutes,
        papers2: renderPaperRoutesLate,
        events: renderEvents,
        seoul: renderSeoul,
        onsite: renderOnsite,
        promo: renderPromo,
      };

      const key = new URLSearchParams(window.location.search).get("card") || "cover";
      const render = renderers[key] || renderers.cover;
      document.getElementById("root").innerHTML = render();
    </script>
  </body>
</html>
