  <text x="1070" y="705" font-size="17" font-weight="850" fill="#111827">到达 / Arrival</text><text x="1070" y="728" font-size="13.5" fill="#475569">ICN T1 -&gt; AREX -&gt; Line 9 -&gt; COEX.</text><text x="1070" y="753" font-size="17" font-weight="850" fill="#111827">日常 / Daily</text><text x="1070" y="776" font-size="13.5" fill="#475569">Use Samseong Line 2 or Bongeunsa Line 9 for the venue.</text><text x="1070" y="801" font-size="17" font-weight="850" fill="#111827">晚间 / Evening</text><text x="1070" y="824" font-size="13.5" fill="#475569">Gangnam, Yeoksam, Dosan are the first dinner/social zones.</text><text x="1070" y="849" font-size="17" font-weight="850" fill="#111827">远端 / Optional</text><text x="1070" y="872" font-size="13.5" fill="#475569">Hongdae, Itaewon, Seongsu, Pangyo need larger buffers.</text>
  <text x="78" y="918" font-size="14.5" fill="#64748b">Luma guests-only 活动只画公开区域；报名后用精确地址替换 / Obfuscated RSVP locations are drawn as public areas only.</text>
  <text x="1065" y="922" font-size="14" fill="#64748b">精确导航仍打开 Google Maps 链接 / Use Google Maps links for exact routing.</text>
